<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>0xWork Quality Check</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;

        --bg: #000000;
        --text: #ffffff;
        --hint: #8e8e93;
        --section-bg: #1c1c1d;
        --accent: #2481cc;
        --accent-text: #ffffff;
        --link: #6ab7ff;
        --err: #ff453a;
        --ok: #34c759;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      .logo {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .chip {
        font-size: 11px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--section-bg);
        color: var(--hint);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .card {
        background: var(--section-bg);
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 8px;
      }
      .card-label {
        font-size: 11px;
        color: var(--hint);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
        font-weight: 600;
      }
      .card-value {
        font-size: 14px;
        line-height: 1.4;
        word-break: break-word;
        color: var(--text);
      }
      .price-block {
        text-align: center;
        margin: 28px 0 8px;
      }
      .price {
        font-size: 36px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1;
        color: var(--text);
      }
      .price-unit {
        font-size: 18px;
        font-weight: 500;
        color: var(--hint);
        margin-left: 4px;
      }
      .price-note {
        font-size: 12px;
        color: var(--hint);
        margin-top: 8px;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        background: var(--accent);
        color: var(--accent-text);
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      button:active:not(:disabled) { opacity: 0.85; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button.busy::before {
        content: "";
        display: inline-block;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid currentColor;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: -2px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .status {
        margin-top: 14px;
        font-size: 13px;
        color: var(--hint);
        white-space: pre-wrap;
        text-align: center;
        min-height: 18px;
        line-height: 1.4;
      }
      .status.ok { color: var(--ok); }
      .status.err { color: var(--err); }
      .footer {
        margin-top: 24px;
        font-size: 11px;
        color: var(--hint);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">0xWork Quality</div>
      <div class="chip">Base Sepolia</div>
    </div>

    <div class="card">
      <div class="card-label">Task</div>
      <div class="card-value" id="task">Loading…</div>
    </div>

    <div class="card">
      <div class="card-label">Submission</div>
      <div class="card-value" id="sub-meta">Loading…</div>
    </div>

    <div class="price-block">
      <div class="price">0.10<span class="price-unit">USDC</span></div>
      <div class="price-note">Paid via x402. Funds go to API operator.</div>
    </div>

    <button id="pay" disabled>
      <span id="pay-label">Pair wallet and pay</span>
    </button>
    <div class="status" id="status"></div>

    <div class="footer">x402 protocol &middot; grading by Llama 3.3</div>

    <script type="module" src="./app.js?v=5"></script>
  </body>
</html>
