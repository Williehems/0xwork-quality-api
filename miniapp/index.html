<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>0xWork Quality Check</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 20px;
        background: var(--tg-theme-bg-color, #fff);
        color: var(--tg-theme-text-color, #111);
      }
      h1 { font-size: 18px; margin: 0 0 16px; }
      .row { margin: 12px 0; font-size: 14px; }
      .label { color: var(--tg-theme-hint-color, #888); }
      .price { font-size: 28px; font-weight: 600; margin: 24px 0 8px; }
      button {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        background: var(--tg-theme-button-color, #2481cc);
        color: var(--tg-theme-button-text-color, #fff);
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: progress; }
      .status { margin-top: 16px; font-size: 13px; color: var(--tg-theme-hint-color, #888); white-space: pre-wrap; }
      .err { color: #d33; }
    </style>
  </head>
  <body>
    <h1>Quality Check</h1>
    <div class="row"><span class="label">Task:</span> <span id="task">…</span></div>
    <div class="row"><span class="label">Submission:</span> <span id="sub-meta">…</span></div>

    <div class="price">0.50 USDC</div>
    <div class="row label">Paid on Base via x402. Funds go directly to the API operator.</div>

    <button id="pay">Pair wallet &amp; pay</button>
    <div class="status" id="status"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
